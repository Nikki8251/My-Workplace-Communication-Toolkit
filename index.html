<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>职场语料库</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1814;
    --text2: #6b6660;
    --text3: #9c9791;
    --accent: #2a2520;
    --accent2: #c8a96e;

    --cat-meeting-bg: #e8f0fb; --cat-meeting-tx: #1a3a6e;
    --cat-email-bg: #e4f5ee; --cat-email-tx: #0d5033;
    --cat-feedback-bg: #fdf0dc; --cat-feedback-tx: #6b3d00;
    --cat-conflict-bg: #fde8e4; --cat-conflict-tx: #6b1f12;
    --cat-present-bg: #eeecfc; --cat-present-tx: #30267a;
    --cat-negotiate-bg: #fce8f0; --cat-negotiate-tx: #6b1e3c;
    --cat-remote-bg: #e8f5e4; --cat-remote-tx: #1e5220;
    --cat-general-bg: #eeebe4; --cat-general-tx: #3e3a34;
    --cat-interview-bg: #e4eef8; --cat-interview-tx: #1a3d5c;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* Header */
  header {
    background: var(--accent);
    color: #fff;
    padding: 2.5rem 2rem 2rem;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    right: -60px; top: -60px;
    width: 260px; height: 260px;
    border-radius: 50%;
    border: 40px solid rgba(200,169,110,0.15);
    pointer-events: none;
  }
  header::after {
    content: '';
    position: absolute;
    right: 80px; bottom: -40px;
    width: 140px; height: 140px;
    border-radius: 50%;
    border: 24px solid rgba(200,169,110,0.1);
    pointer-events: none;
  }
  .header-inner { max-width: 1100px; margin: 0 auto; position: relative; }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  h1 { font-family: 'DM Serif Display', serif; font-size: 2.2rem; font-weight: 400; line-height: 1.2; letter-spacing: -0.01em; }
  h1 span { color: var(--accent2); }
  .header-sub { margin-top: 0.4rem; font-size: 13px; color: rgba(255,255,255,0.5); font-weight: 300; letter-spacing: 0.03em; }
  .total-badge {
    background: rgba(200,169,110,0.2);
    border: 1px solid rgba(200,169,110,0.3);
    color: var(--accent2);
    font-size: 12px; font-weight: 500;
    padding: 4px 12px; border-radius: 20px;
    white-space: nowrap; margin-top: 6px;
  }

  /* Controls */
  .controls { max-width: 1100px; margin: 1.5rem auto 0; padding: 0 1.5rem; }
  .search-row { display: flex; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.4; pointer-events: none; }
  input[type="search"] {
    width: 100%; padding: 10px 12px 10px 38px;
    border: 1px solid var(--border2);
    border-radius: 10px;
    background: var(--surface);
    color: var(--text);
    font-size: 14px; font-family: 'DM Sans', sans-serif;
    outline: none; transition: border-color 0.2s;
  }
  input[type="search"]:focus { border-color: var(--accent2); }
  input[type="search"]::placeholder { color: var(--text3); }
  .btn-add {
    padding: 10px 20px;
    background: var(--accent2);
    color: var(--accent);
    border: none; border-radius: 10px;
    font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    cursor: pointer; white-space: nowrap; transition: opacity 0.15s;
  }
  .btn-add:hover { opacity: 0.85; }

  .filter-row { display: flex; gap: 7px; flex-wrap: wrap; }
  .fil-btn {
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--border2);
    background: transparent; color: var(--text2);
    font-size: 12px; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .fil-btn:hover { border-color: var(--accent); color: var(--text); }
  .fil-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Main */
  main { max-width: 1100px; margin: 0 auto; padding: 1.25rem 1.5rem 3rem; }
  .meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; font-size: 12px; color: var(--text3); }

  /* Grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 10px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1rem 1.125rem;
    transition: border-color 0.15s, box-shadow 0.15s;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .card:hover { border-color: var(--border2); box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 6px; }
  .cat-badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; white-space: nowrap; flex-shrink: 0; }
  .card-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .ic-btn {
    width: 26px; height: 26px; border: none; background: none;
    cursor: pointer; border-radius: 6px; display: flex; align-items: center; justify-content: center;
    color: var(--text3); font-size: 14px; transition: all 0.12s;
  }
  .ic-btn:hover { background: var(--surface2); color: var(--text); }
  .card-phrase { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 5px; line-height: 1.55; }
  .card-note { font-size: 12px; color: var(--text2); line-height: 1.5; }
  .empty { text-align: center; padding: 4rem 1rem; color: var(--text3); grid-column: 1/-1; }
  .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.4; }

  /* Pagination */
  .pagination { display: flex; gap: 7px; align-items: center; justify-content: center; margin-top: 2rem; flex-wrap: wrap; }
  .pg-btn {
    padding: 6px 12px; border: 1px solid var(--border2);
    border-radius: 8px; background: var(--surface);
    color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: all 0.12s;
  }
  .pg-btn:hover:not(:disabled) { background: var(--surface2); }
  .pg-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .pg-btn:disabled { opacity: 0.35; cursor: default; }
  .pg-dots { font-size: 13px; color: var(--text3); padding: 0 2px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: var(--accent); color: #fff;
    padding: 9px 20px; border-radius: 10px;
    font-size: 13px; opacity: 0; transition: all 0.2s; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(20,16,10,0.45);
    display: none; align-items: center; justify-content: center; z-index: 200;
    padding: 1rem;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 18px;
    border: 1px solid var(--border2);
    padding: 1.75rem; width: 100%; max-width: 460px;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .modal h3 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; font-weight: 400; margin-bottom: 1.25rem; }
  .flabel { font-size: 12px; color: var(--text2); margin-bottom: 5px; margin-top: 14px; }
  .flabel:first-of-type { margin-top: 0; }
  .modal input, .modal textarea, .modal select {
    width: 100%; padding: 9px 12px;
    border: 1px solid var(--border2); border-radius: 9px;
    background: var(--bg); color: var(--text);
    font-size: 13.5px; font-family: 'DM Sans', sans-serif; outline: none;
    transition: border-color 0.15s;
  }
  .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: var(--accent2); }
  .modal textarea { height: 72px; resize: vertical; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 9px; margin-top: 1.25rem; }
  .btn-cancel {
    padding: 9px 18px; border: 1px solid var(--border2); border-radius: 9px;
    background: transparent; color: var(--text2);
    font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer;
  }
  .btn-cancel:hover { background: var(--surface2); }
  .btn-save {
    padding: 9px 20px; background: var(--accent); color: #fff;
    border: none; border-radius: 9px;
    font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer;
  }
  .btn-save:hover { opacity: 0.85; }

  /* Cat colors */
  .c-meeting   { background: var(--cat-meeting-bg);  color: var(--cat-meeting-tx); }
  .c-email     { background: var(--cat-email-bg);    color: var(--cat-email-tx); }
  .c-feedback  { background: var(--cat-feedback-bg); color: var(--cat-feedback-tx); }
  .c-conflict  { background: var(--cat-conflict-bg); color: var(--cat-conflict-tx); }
  .c-present   { background: var(--cat-present-bg);  color: var(--cat-present-tx); }
  .c-negotiate { background: var(--cat-negotiate-bg);color: var(--cat-negotiate-tx); }
  .c-remote    { background: var(--cat-remote-bg);   color: var(--cat-remote-tx); }
  .c-general   { background: var(--cat-general-bg);  color: var(--cat-general-tx); }
  .c-interview { background: var(--cat-interview-bg); color: var(--cat-interview-tx); }

  .header-right { display:flex; align-items:center; gap:10px; margin-top:6px; flex-wrap:wrap; }
  .lang-toggle { display:flex; border:1px solid rgba(200,169,110,0.4); border-radius:20px; overflow:hidden; }
  .lang-btn { padding:4px 12px; font-size:12px; font-weight:500; font-family:'DM Sans',sans-serif; background:transparent; color:rgba(255,255,255,0.5); border:none; cursor:pointer; transition:all 0.15s; }
  .lang-btn.active { background:rgba(200,169,110,0.25); color:var(--accent2); }
  @media (max-width: 600px) {
    h1 { font-size: 1.6rem; }
    header { padding: 1.75rem 1.25rem 1.5rem; }
    .controls { padding: 0 1rem; }
    main { padding: 1rem 1rem 3rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <div>
        <h1>Workplace<span> Toolkit</span></h1>
        <p class="header-sub">职场英语表达语料库</p>
      </div>
      <div class="header-right">
        <div class="lang-toggle">
          <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
          <button class="lang-btn" id="btn-zh" onclick="setLang('zh')">中</button>
        </div>
        <div class="total-badge" id="total-badge">563 expressions</div>
      </div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="search-row">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="7" cy="7" r="5" stroke="#1a1814" stroke-width="1.5"/>
        <path d="M11 11L14 14" stroke="#1a1814" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="search" id="search" placeholder="Search expressions..." oninput="onSearch()" />
    </div>
    <button class="btn-add" onclick="openModal()" id="btn-add-label">+ Add</button>
  </div>
  <div class="filter-row" id="filter-row"></div>
</div>

<main>
  <div class="meta-row">
    <span id="meta-txt"></span>
  </div>
  <div class="grid" id="grid"></div>
  <div class="pagination" id="pagination"></div>
</main>

<div class="toast" id="toast">Copied ✓</div>

<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="modal-title">Add Expression</h3>
    <div class="flabel">Expression (English)</div>
    <textarea id="m-phrase" placeholder="e.g. Let's take this offline..."></textarea>
    <div class="flabel">Note (English)</div>
    <input id="m-note-en" type="text" placeholder="e.g. Suggest discussing privately after the meeting" />
    <div class="flabel">说明（中文）</div>
    <input id="m-note-zh" type="text" placeholder="e.g. 建议会后私下讨论" />
    <div class="flabel" id="modal-cat-label">Category</div>
    <select id="m-cat"></select>
    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel-btn" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="modal-save-btn" onclick="saveModal()">Add</button>
    </div>
  </div>
</div>

<script>
const CATS_ZH = {meeting:'会议发言',email:'邮件书写',feedback:'反馈评价',conflict:'沟通异议',present:'汇报演示',negotiate:'谈判协商',remote:'远程协作',general:'通用职场',interview:'面试表达'};
const CATS_EN = {meeting:'Meetings',email:'Emails',feedback:'Feedback',conflict:'Disagreement',present:'Presentations',negotiate:'Negotiation',remote:'Remote Work',general:'General',interview:'Interviews'};
let lang = 'en';
function getCats(){return lang==='zh'?CATS_ZH:CATS_EN;}
function setLang(l){
  lang=l;
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  document.getElementById('btn-zh').classList.toggle('active',l==='zh');
  const isZh=l==='zh';
  document.getElementById('search').placeholder=isZh?'搜索表达或使用场景...':'Search expressions...';
  document.getElementById('btn-add-label').textContent=isZh?'+ 添加表达':'+ Add';
  document.getElementById('toast').textContent=isZh?'已复制到剪贴板 ✓':'Copied ✓';
  render();
}

const RAW = [
  ["Let\'s kick things off.","开场白，正式开始会议","Used to formally start a meeting","meeting"],
  ["Just to set the agenda for today...","说明今日会议议程","Outlines the topics to be covered","meeting"],
  ["Let\'s take this offline.","建议私下继续讨论","Suggest discussing a topic separately after the meeting","meeting"],
  ["Circle back on this later.","此议题稍后再议","Defer a topic to revisit at a later point","meeting"],
  ["Let\'s level-set before we dive in.","开始前先统一认知","Align everyone\'s understanding before starting","meeting"],
  ["Can we table that for now?","暂时搁置这个话题","Pause discussion on a topic for now","meeting"],
  ["Let\'s park that idea.","把这个想法先放一放","Set an idea aside to revisit later","meeting"],
  ["Can everyone hear me okay?","远程会议确认音频","Check audio in remote meetings","meeting"],
  ["I\'ll hand it over to Sarah.","将发言权交给他人","Pass the floor to another speaker","meeting"],
  ["Does anyone have questions before we move on?","推进议程前询问是否有问题","Check for questions before advancing the agenda","meeting"],
  ["Let me make sure I\'m capturing this correctly.","确认自己的理解和记录是否准确","Verify your understanding or notes are accurate","meeting"],
  ["What\'s the action item here?","确认会议结论与行动项","Clarify the next steps or deliverables","meeting"],
  ["Who\'s taking ownership of this?","确认负责人","Identify who is responsible for a task","meeting"],
  ["Can we get a quick show of hands?","快速表决","Quick vote or poll in a meeting","meeting"],
  ["Let\'s go around the room.","依次让每人发言","Have each person share their thoughts in turn","meeting"],
  ["I\'d like to add something to that.","补充上一位发言人的内容","Build on what the previous speaker said","meeting"],
  ["That resonates with me.","表示认同","Express agreement or strong connection with a point","meeting"],
  ["Can you walk us through your thinking?","请对方解释思路","Ask someone to explain their reasoning","meeting"],
  ["Let\'s make sure we\'re aligned on this.","确认团队对此达成一致","Ensure everyone is on the same page","meeting"],
  ["I think we\'re getting off track.","提醒讨论跑题了","Redirect a discussion that has gone off topic","meeting"],
  ["Let\'s bring it back to the main point.","把讨论拉回主题","Refocus the conversation","meeting"],
  ["We\'re running low on time.","提醒时间不够了","Signal that the meeting is running over","meeting"],
  ["Let\'s wrap up with key takeaways.","总结会议要点","Summarize the main points at the end","meeting"],
  ["Can we schedule a follow-up?","建议安排后续会议","Propose a follow-up meeting","meeting"],
  ["I\'ll send out the meeting notes afterward.","会后我来发会议纪要","Offer to distribute meeting minutes","meeting"],
  ["Let me quickly recap what we\'ve discussed.","快速回顾讨论内容","Briefly summarize the discussion so far","meeting"],
  ["Does that work for everyone?","确认方案是否对所有人都合适","Check if a proposal suits all parties","meeting"],

  ["Let\'s make this decision today.","推动当场拍板","Push for a decision in the current meeting","meeting"],
  ["Can we set a deadline for this?","建议明确截止日期","Propose setting a clear due date","meeting"],
  ["What are the blockers here?","询问阻碍因素","Ask what is preventing progress","meeting"],
  ["What\'s the priority order?","询问优先级","Clarify which tasks should come first","meeting"],
  ["Let\'s align on the timeline.","统一时间线","Agree on a shared schedule","meeting"],
  ["I think we need to revisit our assumptions.","建议重新审视假设","Suggest re-examining the underlying assumptions","meeting"],
  ["Can you give us a quick status update?","请对方简要更新进展","Ask for a brief progress report","meeting"],
  ["Let\'s do a quick check-in.","简短进度确认","A brief sync to check on progress","meeting"],
  ["I\'d like to build on what you said.","在对方发言基础上延伸","Extend or expand on someone else\'s point","meeting"],
  ["That\'s a great segue into our next topic.","顺势引入下一议题","Transition smoothly to the next agenda item","meeting"],

  ["I\'d love to get everyone\'s perspective on this.","征集所有人意见","Invite input from all participants","meeting"],
  ["What\'s the biggest risk we\'re overlooking?","询问被忽视的最大风险","Surface hidden risks in the plan","meeting"],

  ["Who are the key stakeholders we need to loop in?","确认需要知会的利益相关方","Identify people who should be informed","meeting"],
  ["What does success look like for this initiative?","明确成功标准","Define what a successful outcome looks like","meeting"],
  ["Let\'s document this decision.","记录这个决定","Record the decision that was made","meeting"],
  ["Can we capture the rationale?","建议记录决策依据","Suggest documenting the reasoning behind a decision","meeting"],
  ["I want to flag a dependency here.","提示某个依赖关系","Point out a task that depends on something else","meeting"],
  ["This is a blocker for my team.","说明某事项是本团队的阻碍","Identify something preventing your team from progressing","meeting"],
  ["Can we escalate this?","建议上报此问题","Suggest raising the issue to a higher level","meeting"],
  ["Let\'s keep the momentum going.","保持推进势头","Encourage the team to maintain their pace","meeting"],
  ["I\'ll take an action item on that.","我来负责跟进这一项","Volunteer to own a follow-up task","meeting"],
  ["Can we assign owners before we leave?","散会前确认负责人","Make sure every task has an owner before ending","meeting"],
  ["Let\'s not boil the ocean here.","不要把事情搞得过于复杂","Avoid over-complicating the problem","meeting"],
  ["We need to be more concrete.","要求讨论更加具体","Ask for more specific and actionable discussion","meeting"],
  ["Let\'s not get lost in the weeds.","不要纠结于细节","Avoid getting stuck on minor details","meeting"],
  ["Let\'s zoom out for a second.","从宏观视角看问题","Step back and look at the big picture","meeting"],

const STORAGE_KEY = 'phrase-corpus-v2';
const BASE_DATA = RAW.map((r,i) => ({id:i+1,phrase:r[0],noteZh:r[1],noteEn:r[2],category:r[3]}));

function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const s = JSON.parse(saved);
      const deletedIds = new Set(s.deleted||[]);
      const edits = s.edits||{};
      const added = s.added||[];
      const merged = BASE_DATA
        .filter(d=>!deletedIds.has(d.id))
        .map(d=>edits[d.id]?Object.assign({},d,edits[d.id]):Object.assign({},d));
      return added.concat(merged);
    }
  } catch(e){}
  return BASE_DATA.map(d=>Object.assign({},d));
}

function persist() {
  try {
    const baseIds = new Set(BASE_DATA.map(d=>d.id));
    const deleted = BASE_DATA.filter(b=>!data.find(d=>d.id===b.id)).map(b=>b.id);
    const edits = {};
    data.forEach(d=>{
      if(!baseIds.has(d.id))return;
      const orig=BASE_DATA.find(b=>b.id===d.id);
      if(orig.phrase!==d.phrase||orig.noteZh!==d.noteZh||orig.noteEn!==d.noteEn||orig.category!==d.category)
        edits[d.id]={phrase:d.phrase,noteZh:d.noteZh,noteEn:d.noteEn,category:d.category};
    });
    const added=data.filter(d=>!baseIds.has(d.id));
    localStorage.setItem(STORAGE_KEY,JSON.stringify({deleted,edits,added}));
  } catch(e){}
}

let data = loadData();
let nextId = data.reduce((m,d)=>Math.max(m,d.id),0)+1;
let activeFilter = 'all';
let currentPage = 1;
const PAGE_SIZE = 24;
let editingId = null;

function filtered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  return data.filter(d => {
    const matchCat = activeFilter === 'all' || d.category === activeFilter;
    if (!q) return matchCat;
    return matchCat && (d.phrase.toLowerCase().includes(q) || d.note.toLowerCase().includes(q));
  });
}

function render() {
  const cats = getCats();
  const allCount = data.length;
  const isZh = lang === 'zh';
  document.getElementById('total-badge').textContent = isZh ? '共 '+allCount+' 条' : allCount+' expressions';
  const filterItems = [['all', isZh ? '全部 ('+allCount+')' : 'All ('+allCount+')'],
    ...Object.entries(cats).map(([k,v]) => {
      const c = data.filter(d => d.category === k).length;
      return [k, v + ' (' + c + ')'];
    })];
  document.getElementById('filter-row').innerHTML = filterItems.map(([k,label]) =>
    '<button class="fil-btn'+(activeFilter===k?' active':'')+'" onclick="setFilter(\'' + k + '\')">' + label + '</button>'
  ).join('');

  const items = filtered();
  const totalPages = Math.max(1, Math.ceil(items.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = 1;
  const pageItems = items.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);

  document.getElementById('meta-txt').textContent = isZh
    ? '找到 '+items.length+' 条 · 第 '+currentPage+' / '+totalPages+' 页'
    : items.length+' results · Page '+currentPage+' of '+totalPages;

  const grid = document.getElementById('grid');
  if (!items.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">◎</div><div>'+(isZh?'没有找到匹配的表达':'No expressions found')+'</div></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  grid.innerHTML = pageItems.map(d => {
    const label = cats[d.category] || (isZh ? '通用' : 'General');
    const cls = 'c-' + (d.category || 'general');
    const note = isZh ? (d.noteZh || d.noteEn || '') : (d.noteEn || d.noteZh || '');
    return '<div class="card">' +
      '<div class="card-top">' +
        '<span class="cat-badge ' + cls + '">' + label + '</span>' +
        '<div class="card-actions">' +
          '<button class="ic-btn" title="Copy" onclick="copyPhrase(' + d.id + ')">⎘</button>' +
          '<button class="ic-btn" title="Edit" onclick="openModal(' + d.id + ')">✎</button>' +
          '<button class="ic-btn" title="Delete" onclick="delItem(' + d.id + ')">✕</button>' +
        '</div>' +
      '</div>' +
      '<div class="card-phrase">' + escHtml(d.phrase) + '</div>' +
      '<div class="card-note">' + escHtml(note) + '</div>' +
    '</div>';
  }).join('');

  const pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }
  let html = '<button class="pg-btn" onclick="goPage('+(currentPage-1)+')" '+(currentPage===1?'disabled':'')+'>‹</button>';
  let prev = 0;
  for (let i = 1; i <= totalPages; i++) {
    if (i===1 || i===totalPages || Math.abs(i-currentPage) <= 2) {
      if (prev && i - prev > 1) html += '<span class="pg-dots">…</span>';
      html += '<button class="pg-btn'+(i===currentPage?' active':'')+'" onclick="goPage('+i+')">'+i+'</button>';
      prev = i;
    }
  }
  html += '<button class="pg-btn" onclick="goPage('+(currentPage+1)+')" '+(currentPage===totalPages?'disabled':'')+'>›</button>';
  pg.innerHTML = html;
}


function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/\x3C/g,'&lt;').replace(/\x3E/g,'&gt;').replace(/"/g,'&quot;');
}

function goPage(p) {
  const items = filtered();
  const totalPages = Math.ceil(items.length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setFilter(f) { activeFilter = f; currentPage = 1; render(); }
function onSearch() { currentPage = 1; render(); }

function copyPhrase(id) {
  const d = data.find(x => x.id === id);
  if (!d) return;
  navigator.clipboard.writeText(d.phrase).catch(() => {});
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function delItem(id){
  if(!confirm(lang==='zh'?'确认删除这条表达？':'Delete this expression?'))return;
  data=data.filter(x=>x.id!==id);
  persist();
  render();
}

function updateModalUI(){
  const isZh=lang==='zh';
  const cats=getCats();
  document.getElementById('modal-cancel-btn').textContent=isZh?'取消':'Cancel';
  const sel=document.getElementById('m-cat');
  const cur=sel.value;
  sel.innerHTML=Object.entries(cats).map(([k,v])=>'<option value="'+k+'">'+v+'</option>').join('');
  if(cur) sel.value=cur;
}
function openModal(id) {
  editingId=id||null;
  const d=id?data.find(x=>x.id===id):null;
  const isZh=lang==='zh';
  document.getElementById('modal-title').textContent=d?(isZh?'编辑表达':'Edit Expression'):(isZh?'添加新表达':'Add Expression');
  document.getElementById('modal-save-btn').textContent=d?(isZh?'保存':'Save'):(isZh?'添加':'Add');
  document.getElementById('m-phrase').value=d?d.phrase:'';
  document.getElementById('m-note-en').value=d?(d.noteEn||''):'';
  document.getElementById('m-note-zh').value=d?(d.noteZh||''):'';
  updateModalUI();
  if(d) document.getElementById('m-cat').value=d.category;
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  editingId = null;
}

function saveModal(){
  const phrase=document.getElementById('m-phrase').value.trim();
  const noteEn=document.getElementById('m-note-en').value.trim();
  const noteZh=document.getElementById('m-note-zh').value.trim();
  const cat=document.getElementById('m-cat').value;
  const isZh=lang==='zh';
  if(!phrase){alert(isZh?'请输入英文表达':'Please enter an expression');return;}
  if(editingId){
    const d=data.find(x=>x.id===editingId);
    if(d){d.phrase=phrase;d.noteEn=noteEn;d.noteZh=noteZh;d.category=cat;}
  }else{
    data.unshift({id:nextId++,phrase,noteEn,noteZh,category:cat});
  }
  closeModal();persist();render();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

render();
</script>
